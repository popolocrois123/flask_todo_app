<!DOCTYPE html>
<html lang="en">
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralNine Todo App</title>
  <meta charset="UTF-8">
  <title>Bootstrap Simple Form</title>

  <!-- Bootstrap CSS（これだけでOK） -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <h1>タスク登録</h1>

  <div class="container mt-5">


   <form method="POST" action="/">
        <div class="mb-3">
        <label class="form-label">{{ form.todo.label }}</label>
        <input type="text" class="form-control" placeholder="タスク" name='{{ form.todo() }}'>
        <label class="form-label">{{ form.todo_detail.label }}</label>
        <textarea class="form-control" id="exampleFormControlTextarea1" rows="5" name='{{ form.todo_detail()}}'></textarea>
        <button type="submit" class="btn btn-primary">登録</button>
      </div>
    </form>
  </div>

</body>
</html>
