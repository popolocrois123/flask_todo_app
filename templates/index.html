<!DOCTYPE html>
<html lang="en">
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralNine Todo App</title>
  <meta charset="UTF-8">
  <title>Bootstrap Simple Form</title>

  <!-- Bootstrap CSS（これだけでOK） -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary bg-opacity-75">
    <h1 class="text-white fw-bold">タスク登録</h1>

  <div class="container">


   <form method="POST" action="/">
      {{ form.hidden_tag() }}
      <div class="card text-center">
        <div class="card-header  text-bg-info text-white fw-bold">
          イベント作成
        </div>
        <div class="card-body text-bg-primary p-3">
          <div class="mb-3">
            {{ form.todo.label() }}
            {{ form.todo() }} <br>

            {{ form.todo_detail.label() }} 
            {{ form.todo_detail() }} <br>
            
            {{ form.limit_date.label() }}
            {{ form.limit_date(class="date_pick", required=False) }}<br>

            {{ form.submit(class="btn btn-primary") }}
          </div>
       </div>
     </div>
    </form>
  </div>

</body>
</html>
