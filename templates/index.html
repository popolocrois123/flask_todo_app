<!DOCTYPE html>
<html lang="en">
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralNine Todo App</title>
  <meta charset="UTF-8">
  <title>Bootstrap Simple Form</title>

  <!-- Bootstrap CSS（これだけでOK） -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <h1>タスク登録</h1>

  <div class="container mt-5">


   <form method="POST" action="/">
        <dl>
            <div class="mb-3">
            <label class="form-label">{{ form.todo.label }}</label>
            <input type="text" class="form-control" placeholder="タスク" name='{{ form.todo() }}'>
            </div>

            <!-- <input class="btn btn-primary" type="submit" value="登録"> -->
        </dl>
        
    </form>
  </div>

</body>
</html>
